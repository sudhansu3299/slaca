<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- P2 fix: removed maximum-scale=1 which blocked user zoom (accessibility violation) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Resolution — Collections</title>
<!-- P1 fix: distinctive font pair. Sora (geometric, authoritative) + Noto Sans (neutral body).
     Both from Google Fonts. Rejected reflex fonts (Inter, DM Sans, Space Grotesk). -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Spectral:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: oklch(96% 0.012 242);
  --canvas: oklch(99% 0.004 242);
  --panel: oklch(96% 0.015 242);
  --panel-soft: oklch(94% 0.02 242);
  --border: oklch(86% 0.02 242);
  --border-strong: oklch(76% 0.03 242);
  --shadow-soft: 0 18px 48px rgba(18, 36, 68, 0.08);
  --text: oklch(28% 0.02 255);
  --text-soft: oklch(48% 0.018 245);
  --muted: oklch(60% 0.02 245);
  --accent: oklch(61% 0.11 248);
  --accent-strong: oklch(55% 0.12 248);
  --accent-soft: oklch(92% 0.04 248);
  --agent-bg: oklch(96% 0.015 248);
  --borrower-bg: oklch(97% 0.04 90);
  --contract-paper: oklch(98% 0.006 85);
  --green: oklch(64% 0.15 150);
  --amber: oklch(73% 0.14 75);
  --red: oklch(58% 0.17 30);
  --space-1: 6px;
  --space-2: 10px;
  --space-3: 14px;
  --space-4: 18px;
  --space-5: 24px;
  --space-6: 32px;
  --space-8: 40px;
  --r-lg: 20px;
  --r-md: 14px;
  --r-sm: 8px;
  --font-ui: 'Public Sans', 'Helvetica Neue', sans-serif;
  --font-body: 'Public Sans', 'Helvetica Neue', sans-serif;
  --font-doc: 'Spectral', 'Times New Roman', serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100dvh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 3px;
  border-radius: 6px;
}
.hdr {
  background: var(--canvas);
  border-bottom: 1px solid var(--border);
  padding: var(--space-3) var(--space-6);
  display: flex;
  align-items: center;
  gap: var(--space-3);
  flex-shrink: 0;
}
.hdr-icon {
  width: 46px;
  height: 46px;
  border-radius: 14px;
  border: 1px solid var(--border-strong);
  background: var(--accent-soft);
  color: var(--accent-strong);
  font-family: var(--font-doc);
  font-size: 18px;
  letter-spacing: 0.08em;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hdr-info h2 {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.hdr-sub {
  font-size: 12px;
  color: var(--text-soft);
  margin-top: 2px;
}
.hdr-right { margin-left: auto; display: flex; align-items: center; gap: var(--space-2); }
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--border-strong);
  transition: all 0.25s ease;
}
.dot.on {
  background: var(--green);
  box-shadow: 0 0 0 4px color-mix(in oklch, var(--green) 35%, transparent);
}
.dot.ring {
  background: var(--amber);
  box-shadow: 0 0 0 4px color-mix(in oklch, var(--amber) 35%, transparent);
  animation: pulse 1.6s ease-in-out infinite;
}
.stage-bar {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: var(--space-2) var(--space-6);
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: 12px;
  color: var(--text-soft);
  flex-shrink: 0;
}
.pill {
  padding: 4px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--canvas);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.pill.assessment { border-color: color-mix(in oklch, var(--accent) 40%, var(--border)); color: var(--accent-strong); }
.pill.resolution { border-color: color-mix(in oklch, var(--amber) 50%, var(--border)); color: var(--amber); }
.pill.final_notice { border-color: color-mix(in oklch, var(--red) 40%, var(--border)); color: var(--red); }
.pill.complete { border-color: color-mix(in oklch, var(--green) 40%, var(--border)); color: var(--green); }
.pill.escalated { border-color: color-mix(in oklch, var(--red) 60%, var(--border)); color: var(--red); }
.voice-banner {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-5);
  background: var(--panel-soft);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.voice-banner.show { display: flex; }
.ring-anim {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  background: var(--accent-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  animation: ringpulse 1.6s ease-out infinite;
}
@keyframes ringpulse {
  0% { box-shadow: 0 0 0 0 color-mix(in oklch, var(--accent) 50%, transparent); }
  70% { box-shadow: 0 0 0 18px color-mix(in oklch, var(--accent) 0%, transparent); }
  100% { box-shadow: 0 0 0 0 color-mix(in oklch, var(--accent) 0%, transparent); }
}
.voice-label { font-weight: 600; font-size: 13px; }
.voice-sub { font-size: 12px; color: var(--text-soft); text-align: center; max-width: 320px; }
.msgs {
  flex: 1 1 auto;
  min-height: 0;
  overflow-y: auto;
  padding: var(--space-5) var(--space-4) var(--space-6);
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
  background: var(--panel-soft);
}
.msgs::-webkit-scrollbar { width: 4px; }
.msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.row {
  display: flex;
  gap: var(--space-2);
  max-width: 84%;
  animation: fadeup 0.18s ease-out;
}
.row.agent { align-self: flex-start; }
.row.borrower { align-self: flex-end; flex-direction: row-reverse; }
.row.system { align-self: center; max-width: 100%; }
.row.contract { align-self: center; width: min(640px, 100%); }
.av {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  border: 1px solid var(--border);
  color: var(--text);
}
.av.agent { background: var(--accent-soft); border-color: color-mix(in oklch, var(--accent) 40%, var(--border)); color: var(--accent-strong); }
.av.borrower { background: var(--canvas); }
.bbl {
  padding: var(--space-3) var(--space-4);
  border-radius: var(--r-lg);
  font-size: 13.5px;
  line-height: 1.6;
  color: var(--text);
  background: var(--canvas);
  box-shadow: 0 4px 16px rgba(15, 31, 54, 0.05);
}
.agent .bbl { background: var(--agent-bg); border-bottom-left-radius: var(--r-sm); }
.borrower .bbl { background: var(--borrower-bg); border-bottom-right-radius: var(--r-sm); }
.ts {
  font-size: 10px;
  color: var(--text-soft);
  margin-top: 4px;
}
.sys-msg {
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 6px var(--space-4);
  font-size: 11px;
  color: var(--text-soft);
  background: var(--canvas);
}
.sys-msg.amber { border-color: var(--amber); color: var(--amber); background: color-mix(in oklch, var(--amber) 10%, white); }
.sys-msg.green { border-color: var(--green); color: var(--green); background: color-mix(in oklch, var(--green) 10%, white); }
.sys-msg.red { border-color: var(--red); color: var(--red); background: color-mix(in oklch, var(--red) 8%, white); }
.typing {
  display: flex;
  gap: var(--space-1);
  padding: var(--space-3);
  background: var(--agent-bg);
  border-radius: var(--r-lg);
  border-bottom-left-radius: var(--r-sm);
}
.typing span {
  width: 6px;
  height: 6px;
  background: var(--text-soft);
  border-radius: 50%;
  animation: typingdot 1.1s ease-out infinite;
}
.typing span:nth-child(2) { animation-delay: 0.18s; }
.typing span:nth-child(3) { animation-delay: 0.36s; }
@keyframes typingdot {
  0%, 60%, 100% { opacity: 0.3; transform: scale(1); }
  30% { opacity: 1; transform: scale(1.25); }
}
.contract-doc {
  background: var(--contract-paper);
  color: oklch(24% 0.02 250);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-soft);
  font-family: var(--font-doc);
  overflow: hidden;
}
.contract-header {
  background: oklch(20% 0.025 248);
  color: oklch(96% 0.008 248);
  padding: var(--space-5) var(--space-6);
  display: flex;
  gap: var(--space-4);
  align-items: center;
}
.contract-logo {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 1px solid oklch(96% 0.008 248 / 0.35);
  color: oklch(96% 0.008 248);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-ui);
}
.contract-title {
  font-family: var(--font-ui);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.contract-subtitle {
  font-size: 11px;
  letter-spacing: 0.04em;
  color: oklch(94% 0.01 248);
}
.contract-stamp {
  margin-left: auto;
  padding: 4px 12px;
  border-radius: var(--r-sm);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  background: var(--accent);
  color: white;
}
.contract-stamp.accepted { background: var(--green); }
.contract-meta {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-4);
  padding: var(--space-3) var(--space-6);
  border-bottom: 2px solid oklch(88% 0.01 248);
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text-soft);
}
.contract-section {
  padding: var(--space-4) var(--space-6);
  border-bottom: 1px solid oklch(90% 0.01 250);
}
.contract-section:last-child { border-bottom: none; }
.contract-section-title {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: var(--space-2);
  border-bottom: 1.5px solid oklch(86% 0.02 248);
  padding-bottom: var(--space-1);
}
.contract-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.contract-table th {
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-size: 10px;
  text-align: left;
  padding: 6px var(--space-3);
  background: oklch(92% 0.008 250);
}
.contract-table td {
  padding: 7px var(--space-3);
  border-bottom: 1px solid oklch(92% 0.008 250);
}
.contract-warning {
  background: color-mix(in oklch, var(--amber) 12%, white);
  border: 1px solid color-mix(in oklch, var(--amber) 40%, white);
  border-radius: var(--r-sm);
  padding: var(--space-2) var(--space-3);
  font-size: 12px;
  color: oklch(38% 0.06 75);
  margin-bottom: var(--space-3);
}
.contract-list {
  margin: 0;
  padding-left: var(--space-5);
  line-height: 1.8;
  color: var(--text);
}
.contract-note {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text-soft);
}
.contract-terms {
  font-size: 11px;
  color: var(--text-soft);
  background: oklch(96% 0.006 90);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--r-sm);
  font-style: italic;
}
.contract-acceptance {
  background: oklch(93% 0.01 240);
  padding: var(--space-4) var(--space-6);
  text-align: center;
}
.contract-acceptance-label {
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--text-soft);
}
.contract-download-btn {
  margin-top: var(--space-2);
  border: none;
  background: var(--accent);
  color: white;
  padding: 8px 18px;
  border-radius: var(--r-md);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s ease;
}
.contract-download-btn::before { content: "↓ "; }
.contract-download-btn:hover { background: var(--accent-strong); }
.contract-download-btn:active { transform: scale(0.96); }
.iarea {
  background: var(--canvas);
  border-top: 1px solid var(--border);
  padding: var(--space-3) var(--space-4);
  display: flex;
  gap: var(--space-2);
  align-items: flex-end;
  flex: 0 0 auto;
}
.iarea textarea {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: var(--space-3);
  font-size: 13px;
  min-height: 44px;
  max-height: 120px;
  resize: none;
  background: var(--panel);
  color: var(--text);
  transition: border-color 0.2s;
}
.iarea textarea:focus { border-color: var(--accent); }
.iarea textarea:disabled { opacity: 0.4; }
.sbtn {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 18px;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s ease;
}
.sbtn:hover:not(:disabled) { background: var(--accent-strong); }
.sbtn:active:not(:disabled) { transform: scale(0.92); }
.sbtn:disabled { opacity: 0.4; cursor: not-allowed; }
@keyframes fadeup {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
@media print {
  body > * { display: none !important; }
  #print-contract-target { display: block !important; }
  #print-contract-target .contract-doc { box-shadow: none; border-radius: 0; }
  .contract-download-btn { display: none !important; }
  @page { size: A4; margin: 15mm 20mm; }
}
</style>
</head>
<body>

<!-- P2 fix: added role="banner" landmark, aria-label on status indicators -->
<header class="hdr" role="banner">
  <!-- Replaced emoji 🏦 with text monogram — more accessible, less "AI slop" -->
  <div class="hdr-icon" aria-hidden="true">RL</div>
  <div class="hdr-info">
    <h2 id="hdr-title">Loan Resolution</h2>
    <div class="hdr-sub" id="hdr-sub" aria-live="polite">Connecting…</div>
  </div>
  <div class="hdr-right">
    <!-- P2 fix: aria-label on status dot -->
    <div class="dot" id="dot" role="status" aria-label="Connection status"></div>
  </div>
</header>

<!-- P2 fix: role="status" on stage bar for screen reader announcements -->
<div class="stage-bar" role="status" aria-live="polite">
  Stage: <span class="pill" id="pill">—</span>
  <span id="stage-name" style="margin-left:4px"></span>
</div>

<!-- P2 fix: role="region" + aria-label on voice banner -->
<div class="voice-banner" id="voice-banner" role="region" aria-label="Voice call in progress" aria-hidden="true">
  <div class="ring-anim" aria-hidden="true">📞</div>
  <div class="voice-label">Your phone is ringing</div>
  <div class="voice-sub">Answer the call to discuss your settlement options. The agent already knows your situation.</div>
</div>

<!-- P2 fix: role="log" for chat message region -->
<main class="msgs" id="msgs" role="log" aria-label="Conversation" aria-live="polite" aria-relevant="additions"></main>

<!-- Hidden print target — only shown during window.print() via @media print -->
<div id="print-contract-target" style="display:none"></div>

<!-- P2 fix: role="form" + aria-label on input area -->
<div class="iarea" role="form" aria-label="Send message">
  <textarea id="inp" rows="1" placeholder="Type your reply…"
    aria-label="Your reply"
    onkeydown="onKey(event)"
    oninput="resize(this)"></textarea>
  <!-- P2 fix: aria-label on send button (was unlabelled icon-only button) -->
  <button class="sbtn" id="sbtn" onclick="send()" aria-label="Send message">&#10148;</button>
</div>

<script>
const WF = "{{WORKFLOW_ID}}";
const WS_URL = `ws://${location.host}/ws/${WF}`;

const msgsEl  = document.getElementById("msgs");
const inpEl   = document.getElementById("inp");
const sbtnEl  = document.getElementById("sbtn");
const dotEl   = document.getElementById("dot");
const hdrSub  = document.getElementById("hdr-sub");
const pillEl  = document.getElementById("pill");
const nameEl  = document.getElementById("stage-name");
const voiceEl = document.getElementById("voice-banner");

const STAGE_NAMES = {
  assessment:   "Assessment Chat",
  resolution:   "Voice Call",
  final_notice: "Final Notice",
  complete:     "Resolved ✓",
  escalated:    "Escalated",
};

let ws, retryTimer, stage = "assessment", disabled = false;

// ── WebSocket ──────────────────────────────────────────────
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    dotEl.className = "dot on";
    dotEl.setAttribute("aria-label", "Connected");
    hdrSub.textContent = "Connected";
    clearTimeout(retryTimer);
  };
  ws.onclose = () => {
    dotEl.className = "dot";
    dotEl.setAttribute("aria-label", "Reconnecting");
    hdrSub.textContent = "Reconnecting…";
    retryTimer = setTimeout(connect, 2500);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = e => handle(JSON.parse(e.data));
}

function handle(m) {
  if (m.role === "agent") {
    removeTyping();
    addMsg("agent", m.content, m.stage, m.ts);
    setStage(m.stage);
  } else if (m.role === "borrower") {
    // already shown locally — skip duplicate echo
  } else if (m.role === "system") {
    handleSystem(m);
  }
}

function handleSystem(m) {
  const ev = m.event || "";
  if (ev === "assessment_complete") {
    addSys("Assessment complete — you will receive a call shortly.", "amber");
    setStage("resolution");
    setVoice(true);
    setDisabled(true, "Waiting for your call…");
    dotEl.className = "dot ring";
    dotEl.setAttribute("aria-label", "Voice call in progress");
    hdrSub.textContent = "Voice call in progress";
  } else if (ev === "final_notice_opened") {
    setVoice(false);
    setStage("final_notice");
    dotEl.className = "dot on";
    dotEl.setAttribute("aria-label", "Final notice stage");
    hdrSub.textContent = "Final Notice";
    setDisabled(false);
    addSys(m.content, "amber");
  } else if (ev === "contract") {
    addContract(m.content);
  } else if (ev === "final_notice_resolved") {
    addSys("✓ " + m.content, "green");
    setStage("complete");
    setDisabled(true, "Case closed.");
  } else if (ev === "final_notice_escalated") {
    addSys("⚠ " + m.content, "red");
    setStage("escalated");
    setDisabled(true, "Escalated to legal.");
  }
}

function addContract(html) {
  const row = el("div", "row contract");
  row.innerHTML = html;
  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

// ── PDF download ─────────────────────────────────────────────
// Called by the "Download PDF" button inside the contract card.
// Copies the contract HTML into the hidden #print-contract-target
// div (which @media print makes the only visible element) and
// triggers window.print() so the browser produces a clean A4 PDF.
function downloadContractPDF(btn) {
  const contractDoc = btn.closest(".contract-doc");
  if (!contractDoc) return;

  const printTarget = document.getElementById("print-contract-target");
  // Clone so the original card stays in the chat
  printTarget.innerHTML = "";
  printTarget.appendChild(contractDoc.cloneNode(true));

  // Remove the download button from the clone so it doesn't appear in the PDF
  printTarget.querySelectorAll(".contract-download-btn").forEach(b => b.remove());

  // Brief feedback on the button
  const orig = btn.textContent;
  btn.textContent = "Preparing…";
  btn.disabled = true;

  // Small delay so the DOM update renders before print dialog opens
  setTimeout(() => {
    window.print();
    // Restore button after print dialog closes (or is cancelled)
    setTimeout(() => {
      btn.textContent = orig;
      btn.disabled = false;
      printTarget.innerHTML = "";
    }, 500);
  }, 80);
}

// ── UI helpers ──────────────────────────────────────────────
function setStage(s) {
  if (!s || s === stage) return;
  stage = s;
  pillEl.className = `pill ${s}`;
  pillEl.textContent = s.replace("_", " ");
  nameEl.textContent = STAGE_NAMES[s] || "";
  // Defensive UI sync: once we leave resolution, never keep ringing banner visible.
  if (s !== "resolution") setVoice(false);
}

function setVoice(on) {
  voiceEl.classList.toggle("show", on);
  voiceEl.setAttribute("aria-hidden", on ? "false" : "true");
}

function setDisabled(on, hint) {
  disabled = on;
  inpEl.disabled = on;
  sbtnEl.disabled = on;
  inpEl.placeholder = hint || (on ? "…" : "Type your reply…");
}

function renderMarkdown(text) {
  let html = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  html = html
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>");

  html = html.replace(/((?:^\d+\.\s+.+\n?)+)/gm, (block) => {
    const items = block.trim().split("\n")
      .filter(l => l.match(/^\d+\./))
      .map(l => `<li>${l.replace(/^\d+\.\s+/, "")}</li>`)
      .join("");
    return `<ol style="margin:6px 0 6px 18px;line-height:1.8">${items}</ol>`;
  });

  html = html.replace(/((?:^[-•]\s+.+\n?)+)/gm, (block) => {
    const items = block.trim().split("\n")
      .filter(l => l.match(/^[-•]/))
      .map(l => `<li>${l.replace(/^[-•]\s+/, "")}</li>`)
      .join("");
    return `<ul style="margin:6px 0 6px 18px;line-height:1.8">${items}</ul>`;
  });

  html = html
    .replace(/\n{2,}/g, "<br><br>")
    .replace(/\n/g, "<br>");

  return html;
}

function addMsg(role, text, stg, ts) {
  setStage(stg);
  const row  = el("div", `row ${role}`);
  const av   = el("div", `av ${role}`);
  // P1 fix: meaningful text labels instead of bare emoji (still aria-hidden
  // since the bubble text carries the content meaning)
  av.textContent = role === "agent" ? "AI" : "You";
  av.setAttribute("aria-hidden", "true");
  const wrap = el("div");
  const bbl  = el("div", "bbl");
  if (role === "agent") {
    bbl.innerHTML = renderMarkdown(text);
  } else {
    bbl.textContent = text;
  }
  const t = el("div", "ts");
  t.textContent = ts ? new Date(ts).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}) : "";
  t.setAttribute("aria-hidden", "true");
  wrap.append(bbl, t);
  row.append(role === "agent" ? av : wrap, role === "agent" ? wrap : av);
  msgsEl.appendChild(row);
  scroll();
}

function addSys(text, cls="") {
  const row = el("div", "row system");
  const d   = el("div", `sys-msg ${cls}`);
  d.innerHTML = text;
  row.appendChild(d);
  msgsEl.appendChild(row);
  scroll();
}

function showTyping() {
  const row = el("div", "row agent");
  row.id = "typing";
  row.setAttribute("aria-label", "Agent is typing");
  row.innerHTML = `<div class="av agent" aria-hidden="true">AI</div><div class="typing" aria-hidden="true"><span></span><span></span><span></span></div>`;
  msgsEl.appendChild(row);
  scroll();
}
function removeTyping() { document.getElementById("typing")?.remove(); }

function scroll() { msgsEl.scrollTop = msgsEl.scrollHeight; }

function el(tag, cls="") {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

// ── Send ────────────────────────────────────────────────────
function send() {
  const text = inpEl.value.trim();
  if (!text || !ws || ws.readyState !== 1 || disabled) return;
  addMsg("borrower", text, stage, new Date().toISOString());
  ws.send(JSON.stringify({message: text}));
  inpEl.value = "";
  resize(inpEl);
  showTyping();
}

function onKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
}

function resize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 100) + "px";
}

// ── Init ─────────────────────────────────────────────────────
setStage("assessment");
pillEl.className = "pill assessment";
pillEl.textContent = "assessment";
nameEl.textContent = STAGE_NAMES.assessment;
connect();
</script>
